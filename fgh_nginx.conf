server { #listen on loopback for HAproxy

        root /var/www/fgh.donutsloth.net/html;
        index index.html index.htm index.nginx-debian.html;

        server_name fgh.donutsloth.net www.fgh.donutsloth.net;

        location / {
                try_files $uri $uri/ =404;
                add_header X-Robots-Tag "noindex" always;
        }



    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/fgh.donutsloth.net/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/fgh.donutsloth.net/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.fgh.donutsloth.net) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = fgh.donutsloth.net) {
        return 301 https://$host$request_uri;
    } # managed by Certbot



        server_name fgh.donutsloth.net www.fgh.donutsloth.net;
    listen 80;
    return 404; # managed by Certbot




}